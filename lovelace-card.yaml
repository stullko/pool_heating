# Pool Heating Controller - Mushroom-style Lovelace card.
# Requires HACS frontend cards: Mushroom, mini-graph-card, stack-in-card.
# This variant assumes the integration/device is named "Tepelné čerpadlo bazéna",
# so Home Assistant entity ids use the tepelne_cerpadlo_bazena_* prefix.
# Adjust the source entity ids below if your pool sensors have different names:
#   pool water  : sensor.teplomer_bazen_temperature
#   heat pump   : switch.sonoff_10013cc5bd
#   outdoor     : sensor.pracovna_teplota
#   battery     : sensor.teplomer_bazen_battery
#   night state : sensor.night_state  (optional graph shading)

type: custom:stack-in-card
cards:
  - type: custom:mushroom-template-card
    primary: Tepelné čerpadlo bazéna
    secondary: >-
      {% set reason = state_attr('sensor.tepelne_cerpadlo_bazena_status', 'reason') %}
      {{ reason if reason else states('sensor.tepelne_cerpadlo_bazena_status') }}
    multiline_secondary: true
    icon: mdi:pool
    icon_color: >-
      {% set status = states('sensor.tepelne_cerpadlo_bazena_status') %}
      {{ {
        'heating': 'red',
        'frost_protect': 'red',
        'target_reached': 'green',
        'idle_band': 'green',
        'waiting_rain': 'blue',
        'waiting_cold': 'blue',
        'waiting_cold_now': 'blue',
        'waiting_better_window': 'blue',
        'no_window': 'blue',
        'waiting_price': 'amber',
        'night_off': 'grey',
        'mode_off': 'grey',
        'waiting_filtration': 'grey',
        'compressor_protect': 'grey',
        'manual_override': 'purple',
        'sensor_unavailable': 'red',
        'switch_unavailable': 'red',
        'forecast_unavailable': 'orange'
      }.get(status, 'grey') }}
    badge_icon: >-
      {% if is_state('binary_sensor.tepelne_cerpadlo_bazena_should_heat', 'on') %}
        mdi:fire
      {% else %}
        mdi:power-sleep
      {% endif %}
    badge_color: >-
      {% if is_state('binary_sensor.tepelne_cerpadlo_bazena_should_heat', 'on') %}
        red
      {% else %}
        grey
      {% endif %}
    tap_action:
      action: more-info
      entity: sensor.tepelne_cerpadlo_bazena_status

  - type: custom:mushroom-chips-card
    alignment: center
    chips:
      - type: template
        entity: binary_sensor.tepelne_cerpadlo_bazena_should_heat
        icon: >-
          {{ 'mdi:radiator' if is_state('binary_sensor.tepelne_cerpadlo_bazena_should_heat', 'on')
             else 'mdi:radiator-off' }}
        icon_color: >-
          {{ 'red' if is_state('binary_sensor.tepelne_cerpadlo_bazena_should_heat', 'on') else 'grey' }}
        content: >-
          {{ 'Hriať' if is_state('binary_sensor.tepelne_cerpadlo_bazena_should_heat', 'on') else 'Nehriať' }}
      - type: template
        entity: select.tepelne_cerpadlo_bazena_mode
        icon: mdi:tune
        icon_color: >-
          {{ {'auto':'green','force_on':'red','off':'grey'}.get(states('select.tepelne_cerpadlo_bazena_mode'), 'grey') }}
        content: "{{ states('select.tepelne_cerpadlo_bazena_mode') }}"
      - type: template
        entity: sensor.tepelne_cerpadlo_bazena_predicted_ready
        icon: mdi:calendar-clock
        icon_color: teal
        content: >-
          {% set value = states('sensor.tepelne_cerpadlo_bazena_predicted_ready') %}
          {{ as_timestamp(value) | timestamp_custom('%a %H:%M') if value not in ['unknown','unavailable','none','None',''] else 'bez odhadu' }}

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.teplomer_bazen_temperature
        name: Voda
        icon: mdi:pool-thermometer
        icon_color: green
      - type: custom:mushroom-entity-card
        entity: sensor.pracovna_teplota
        name: Vonku
        icon: mdi:thermometer
        icon_color: orange
      - type: custom:mushroom-entity-card
        entity: sensor.tepelne_cerpadlo_bazena_predicted_ready
        name: Dohriatie
        icon: mdi:calendar-clock
        icon_color: teal
      - type: custom:mushroom-entity-card
        entity: sensor.teplomer_bazen_battery
        name: Batéria
        icon: mdi:battery
        icon_color: blue
      - type: custom:mushroom-entity-card
        entity: sensor.tepelne_cerpadlo_bazena_required_heating_hours
        name: Potrebný ohrev
        icon: mdi:timer-sand
        icon_color: amber
      - type: custom:mushroom-entity-card
        entity: sensor.tepelne_cerpadlo_bazena_energy_needed
        name: Potrebná energia
        icon: mdi:lightning-bolt
        icon_color: amber
      - type: custom:mushroom-entity-card
        entity: sensor.tepelne_cerpadlo_bazena_power
        name: Príkon
        icon: mdi:flash
        icon_color: red
      - type: custom:mushroom-entity-card
        entity: sensor.tepelne_cerpadlo_bazena_energy_consumed
        name: Spotreba
        icon: mdi:lightning-bolt-circle
        icon_color: purple

  - type: custom:mushroom-select-card
    entity: select.tepelne_cerpadlo_bazena_mode
    name: Režim
    icon: mdi:tune

  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.tepelne_cerpadlo_bazena_heat_rate
        name: Rýchlosť ohrevu
        icon: mdi:thermometer-chevron-up
        icon_color: red
      - type: custom:mushroom-entity-card
        entity: sensor.tepelne_cerpadlo_bazena_loss_coefficient
        name: Tepelná strata
        icon: mdi:thermometer-chevron-down
        icon_color: blue
      - type: custom:mushroom-entity-card
        entity: sensor.tepelne_cerpadlo_bazena_model_confidence
        name: Model
        icon: mdi:school
        icon_color: teal

  - type: custom:mini-graph-card
    entities:
      - entity: sensor.teplomer_bazen_temperature
        name: Teplota bazéna
        color: "#2f9e44"
        color_thresholds:
          - value: 22
            color: "#f08c00"
          - value: 26
            color: "#2f9e44"
          - value: 28
            color: "#0ca678"
      - entity: switch.sonoff_10013cc5bd
        name: Čerpadlo
        color: "#e03131"
        show_line: false
        show_points: false
        show_fill: true
        y_axis: secondary
      - entity: binary_sensor.tepelne_cerpadlo_bazena_should_heat
        name: Odporúčanie
        color: "#f03e3e"
        show_line: false
        show_points: false
        show_fill: true
        y_axis: secondary
      - entity: sensor.night_state
        name: Noc
        color: rgba(134,142,150,0.28)
        show_line: false
        show_points: false
        show_fill: true
        y_axis: secondary
        show_legend: false
    hours_to_show: 72
    line_width: 2
    points_per_hour: 2
    font_size: 50
    animate: true
    show:
      name: false
      icon: false
      legend: true
